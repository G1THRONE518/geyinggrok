[build]
  command = "mkdir -p dist && cp outputs/bilibili-geying-s3-finals-combined-playground-v13-dark.html dist/index.html && printf '%s\\n' '/api/wallet /.netlify/functions/wallet 200' > dist/_redirects"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/wallet"
  to = "/.netlify/functions/wallet"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  ACCOUNT_INITIAL_COINS = "100"
  ACCOUNT_MAX_STAKE = "100"
  ACCOUNT_RATE_LIMIT_PER_MIN = "10"